name: Apply to B12

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apply.py"
      - ".github/workflows/apply.yml"

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Submit application
        env:
          APPLICANT_NAME: ${{ vars.APPLICANT_NAME }}
          APPLICANT_EMAIL: ${{ vars.APPLICANT_EMAIL }}
          RESUME_LINK: ${{ vars.RESUME_LINK }}
          REPOSITORY_LINK: ${{ github.server_url }}/${{ github.repository }}
          ACTION_RUN_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python apply.py
